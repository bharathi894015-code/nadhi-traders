<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products – NADHI TRADERS</title>
    <meta name="description" content="Browse all premium dry fruits and healthy seeds available at NADHI TRADERS.">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-logo">
                <img src="/images/logo.png" alt="Nadhi Traders Logo" style="height:54px;width:auto;object-fit:contain;">
        <div class="nav-logo-text">
          <h2>NADHI TRADERS</h2>
          <span>Premium Dry Fruits & Seeds</span>
        </div>
            </a>
            <button class="nav-toggle" id="nav-toggle">☰</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products.html" class="active">Products</a></li>
                <li><a href="/cart.html" class="cart-btn">🛒 Cart <span class="cart-count" id="cart-count"
                            style="display:none">0</span></a></li>        <li><a href="/admin/login.html" class="admin-nav-btn">🔐 Admin</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-header">
        <h1>Our Products</h1>
        <p>Fresh, natural, and packed with goodness</p>
    </div>

    <section class="section">
        <div class="container">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">🌟 All</button>
                <button class="filter-btn" data-filter="Dry Fruit">🥜 Dry Fruits</button>
                <button class="filter-btn" data-filter="Seed">🌱 Seeds</button>
                <div style="margin-left:auto;color:var(--text-light);font-size:0.88rem" id="product-count"></div>
            </div>
            <div class="products-grid" id="products-grid">
                <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-light)">Loading products…
                </div>
            </div>
        </div>
    </section>

    <a href="https://wa.me/918838740081?text=Hi! I want to order from NADHI TRADERS" target="_blank" style="position:fixed;bottom:24px;right:24px;z-index:500;width:56px;height:56px;border-radius:50%;
  background:#25D366;display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  box-shadow:0 4px 16px rgba(37,211,102,0.5);" title="Order on WhatsApp">💬</a>

    <footer class="footer">
        <div class="footer-bottom">© 2025 NADHI TRADERS — <a href="/">Home</a> · <a href="/cart.html">Cart</a></div>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/cart.js"></script>
    <script>
        let allProducts = [];
        let activeFilter = 'all';

        async function loadProducts() {
            const grid = document.getElementById('products-grid');
            try {
                allProducts = await API.get('/api/products');
                // Check URL param
                const params = new URLSearchParams(window.location.search);
                const cat = params.get('category');
                if (cat) {
                    activeFilter = cat;
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.filter === cat);
                    });
                }
                renderProducts();
            } catch (e) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--text-light)">Failed to load products. Is the server running?</p>`;
            }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const countEl = document.getElementById('product-count');
            const filtered = activeFilter === 'all' ? allProducts : allProducts.filter(p => p.category === activeFilter);
            countEl.textContent = `${filtered.length} products`;
            if (!filtered.length) { grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light)">No products in this category.</p>'; return; }
            grid.innerHTML = filtered.map(p => productCard(p)).join('');
            grid.querySelectorAll('.weight-btn').forEach(btn => btn.addEventListener('click', selectWeight));
            grid.querySelectorAll('.add-cart-btn').forEach(btn => btn.addEventListener('click', addToCart));
        }

        function productCard(p) {
            const badge = p.category === 'Dry Fruit' ? 'badge-dry-fruit' : 'badge-seed';
            return `
    <div class="product-card">
      <a href="/product-detail.html?id=${p.id}">
        ${getProductImageTag(p.image, 'product-card-img')}
      </a>
      <div class="product-card-body">
        <span class="product-card-badge ${badge}">${p.category}</span>
        <a href="/product-detail.html?id=${p.id}"><div class="product-card-name">${p.name}</div></a>
        <div class="product-card-desc">${p.description.substring(0, 75)}…</div>
        <div class="product-card-price">${formatPrice(p.price)} <span>/ 1kg</span></div>
        <div class="weight-selector">
          ${['100g', '250g', '500g', '1kg'].map((w, i) => `<button class="weight-btn${i === 1 ? ' active' : ''}" data-weight="${w}" data-pid="${p.id}">${w}</button>`).join('')}
        </div>
        <div style="display:flex;gap:8px">
          <a href="/product-detail.html?id=${p.id}" class="btn btn-secondary btn-sm" style="flex:1">Details</a>
          <button class="btn btn-primary btn-sm add-cart-btn" style="flex:1" data-pid="${p.id}" data-pname="${p.name}" data-pprice="${p.price}" data-pimage="${p.image}" data-pcategory="${p.category}">🛒 Add</button>
        </div>
      </div>
    </div>`;
        }

        function selectWeight(e) {
            const pid = e.target.dataset.pid;
            document.querySelectorAll(`.weight-btn[data-pid="${pid}"]`).forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
        }

        function addToCart(e) {
            const btn = e.target;
            const pid = parseInt(btn.dataset.pid);
            const weightBtn = document.querySelector(`.weight-btn.active[data-pid="${pid}"]`);
            const weight = weightBtn ? weightBtn.dataset.weight : '250g';
            const product = { id: pid, name: btn.dataset.pname, price: parseFloat(btn.dataset.pprice), image: btn.dataset.pimage, category: btn.dataset.pcategory };
            Cart.add(product, weight);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                renderProducts();
            });
        });

        initNavbar();
        loadProducts();
    </script>
</body>

</html>
